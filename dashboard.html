<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | तालवीर ढोल-ताशा पथक</title>

  <!-- IMPORTANT: style.css must be in same folder -->
  <link rel="stylesheet" href="./style.css?v=7" />
</head>
<body>

  <div class="main-container">

    <header class="dashboard-header">
      <div>
        <h1>तालवीर ढोल-ताशा पथक</h1>
        <p>Expense, Audit & Event Records</p>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <section class="summary-section">
      <h2>Available Balance Summary</h2>
      <p class="sheet-note">Source: Dashboard_Summary!A4:B6</p>

      <div id="balanceCards" class="balance-grid">
        <p class="loading">Loading balance...</p>
      </div>
    </section>

    <section class="button-section">
      <button onclick="loadSheet('व्यवहार_नोंद')">व्यवहार_नोंद</button>
      <button onclick="loadSheet('Event_Show_Master')">Income_नोंद </button>
    </section>

    <section class="table-section">
      <h2 id="tableTitle">Select a sheet</h2>
      <div id="tableContainer" class="table-container">
        <p>Please click one of the above buttons to view data.</p>
      </div>
    </section>

  </div>

  <script src="./app.js?v=10"></script>
</body>
</html>
