<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | तालवीर ढोल-ताशा पथक</title>

  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

  <div class="login-container">

  </div>

  <script src="auth.js?v=4"></script>
